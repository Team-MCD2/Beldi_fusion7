<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 200" width="140" height="200" role="img" aria-label="Lanterne marocaine illuminee">
  <!-- Halo lumineux (ambient pulsant, tres subtil) -->
  <circle cx="70" cy="100" r="58" fill="none" stroke="currentColor" stroke-width="1" opacity=".18">
    <animate attributeName="r" values="54;62;54" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".1;.22;.1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <g fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round">
    <!-- Chaine de suspension -->
    <line x1="70" y1="4" x2="70" y2="24"/>

    <!-- Anneau du crochet -->
    <circle cx="70" cy="6" r="2.5"/>

    <!-- Chapiteau (2 etages etages) -->
    <path d="M 56,30 L 84,30 L 80,24 L 60,24 Z"/>
    <path d="M 50,36 L 90,36 L 84,30 L 56,30 Z"/>

    <!-- Pointe triangulaire au sommet -->
    <path d="M 66,24 L 70,14 L 74,24"/>

    <!-- Corps ogival principal -->
    <path d="M 40,44 Q 34,100 52,138 L 88,138 Q 106,100 100,44 Z"/>

    <!-- Barres horizontales haut + bas -->
    <line x1="40" y1="44" x2="100" y2="44"/>
    <line x1="46" y1="138" x2="94" y2="138"/>

    <!-- 3 nervures verticales (cage) -->
    <path d="M 55,44 Q 48,92 60,138"/>
    <line x1="70" y1="44" x2="70" y2="138" opacity=".5"/>
    <path d="M 85,44 Q 92,92 80,138"/>

    <!-- Etoile 8 branches centrale (moucharabieh) -->
    <path d="M 70,60 L 72,66 L 78,66 L 73,70 L 75,76 L 70,72 L 65,76 L 67,70 L 62,66 L 68,66 Z"/>

    <!-- Petits losanges decoratifs sur les flancs -->
    <path d="M 50,92 L 53,88 L 56,92 L 53,96 Z"/>
    <path d="M 84,92 L 87,88 L 90,92 L 87,96 Z"/>
    <path d="M 58,110 L 61,106 L 64,110 L 61,114 Z"/>
    <path d="M 76,110 L 79,106 L 82,110 L 79,114 Z"/>
    <circle cx="70" cy="108" r="1.5" fill="currentColor" stroke="none"/>

    <!-- Base evasee -->
    <path d="M 46,138 L 94,138 L 98,148 L 42,148 Z"/>
    <path d="M 42,148 L 98,148 L 94,156 L 46,156 Z"/>

    <!-- Pompon suspendu -->
    <line x1="70" y1="156" x2="70" y2="164"/>
  </g>

  <!-- Pompon base + glan -->
  <circle cx="70" cy="166" r="3" fill="none" stroke="currentColor" stroke-width="1.25"/>
  <path d="M 68,170 L 67,176 M 70,170 L 70,178 M 72,170 L 73,176" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>

  <!-- Flamme anime au centre -->
  <path d="M 70,72 Q 67,66 70,60 Q 73,66 70,72 Z" fill="currentColor" stroke="none" opacity=".65">
    <animate attributeName="opacity" values=".4;.8;.4" dur="1.5s" repeatCount="indefinite"/>
  </path>
</svg>
