      <path d="M 30,0 C 26,-6 22,-6 18,0 C 14,-6 10,-6 6,0" transform="translate(14 0) scale(-1 1)"/>
    </g>
    <!-- Points -->
    <circle cx="148" cy="20" r="1.5" fill="currentColor"/>
    <circle cx="156" cy="20" r="1.5" fill="currentColor"/>
    <circle cx="252" cy="20" r="1.5" fill="currentColor"/>
    <circle cx="244" cy="20" r="1.5" fill="currentColor"/>
  </g>
</svg>
