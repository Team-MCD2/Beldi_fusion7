<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 40" width="400" height="40" role="img" aria-label="Separateur arabesque">
  <g fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ligne centrale -->
    <path d="M 0,20 L 140,20"/>
    <path d="M 260,20 L 400,20"/>
    <!-- Ornement central : etoile + arabesques -->
