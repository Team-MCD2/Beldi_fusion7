<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140" role="img" aria-label="Branche de menthe fraiche">
  <g fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round" stroke-linecap="round">
    <!-- Tige principale ondulee -->
    <path d="M 60,132 Q 58,108 62,82 Q 60,58 58,34 Q 58,24 60,16"/>

    <!-- Feuille 1 (bas gauche) -->
    <g transform="translate(48 112) rotate(-22)">
      <path d="M 0,0 Q -14,-10 -8,-28 Q 6,-22 10,-4 Q 4,4 0,0 Z"/>
      <path d="M 0,-4 Q -2,-14 -5,-22" opacity=".6"/>
    </g>

    <!-- Feuille 2 (bas droite) -->
    <g transform="translate(68 104) rotate(26)">
      <path d="M 0,0 Q 14,-10 8,-28 Q -6,-22 -10,-4 Q -4,4 0,0 Z"/>
      <path d="M 0,-4 Q 2,-14 5,-22" opacity=".6"/>
    </g>

    <!-- Feuille 3 (milieu gauche, plus grande) -->
    <g transform="translate(50 74) rotate(-30)">
      <path d="M 0,0 Q -16,-12 -10,-32 Q 8,-26 12,-4 Q 5,5 0,0 Z"/>
      <path d="M 0,-5 Q -3,-16 -6,-26" opacity=".6"/>
      <!-- Petites nervures laterales -->
      <path d="M -4,-12 L -9,-14" opacity=".45"/>
      <path d="M -5,-19 L -10,-21" opacity=".45"/>
    </g>

    <!-- Feuille 4 (milieu droite) -->
    <g transform="translate(66 64) rotate(30)">
      <path d="M 0,0 Q 16,-12 10,-32 Q -8,-26 -12,-4 Q -5,5 0,0 Z"/>
      <path d="M 0,-5 Q 3,-16 6,-26" opacity=".6"/>
      <path d="M 4,-12 L 9,-14" opacity=".45"/>
      <path d="M 5,-19 L 10,-21" opacity=".45"/>
    </g>

    <!-- Petit bourgeon au sommet (en ogive) -->
    <path d="M 60,16 Q 54,8 60,0 Q 66,8 60,16 Z"/>
    <path d="M 60,8 L 60,14" opacity=".5"/>
  </g>
</svg>
